spring:
  main:
    allow-bean-definition-overriding: true

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  #Disabled for basic tests to speed up startup)
  liquibase:
    enabled: false

  #Disabled for tests to ensure data consistency
  cache:
    type: none

  security:
    user:
      password: test-password

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-components: always

TEST_URL: http://localhost:8080
